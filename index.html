<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCC2026 | Cinematic Countdown</title>
    <style>
        /* CSS resets for a clean slate */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Clean, epic font */
        }

        /* The background of the entire page */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1d; /* Fallback color */
            
            /* THIS IS THE EPIC BACKGROUND! */
            background-image: url('warsaw-bg.jpg'); /* Referencing your uploaded image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Adding a dark overlay for contrast against the light city sky */
            box-shadow: inset 0 0 0 1000px rgba(0, 0, 0, 0.4); 
            overflow: hidden;
        }

        /* The main container/frosted glass panel */
        .glass-panel {
            text-align: center;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            
            /* Advanced Frosted Glass (Glassmorphism) */
            background: rgba(255, 255, 255, 0.03); /* Extremely translucent white */
            backdrop-filter: blur(25px) saturate(180%); /* THE BLUR! High blur, vibrant colors */
            -webkit-backdrop-filter: blur(25px) saturate(180%); /* Safari support */
            
            /* Border and shadows for depth */
            border: 1px solid rgba(255, 255, 255, 0.08); /* Minimal white border */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); /* Subtle deep shadow */
        }

        /* Header Text: MCC2026 */
        h1 {
            font-size: 32px;
            font-weight: 300; /* Ultra-light for epic feel */
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Body text: Are you the Main Character? */
        .intro-text {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Pink highlighting in the text */
        .highlight {
            color: #ff007f; /* Vibrant neon pink */
            font-weight: 500;
        }

        /* The countdown numbers (vibrant glow) */
        .count-block {
            display: inline-block;
            margin: 0 10px;
            min-width: 70px;
        }

        .number {
            font-size: 56px;
            font-weight: 200; /* Ultra-light for neon look */
            color: #ff007f;
            
            /* THE GLOW EFFECT (Advanced text-shadow) */
            text-shadow: 
                0 0 5px rgba(255, 0, 127, 0.8), /* Inner pink glow */
                0 0 15px rgba(255, 0, 127, 0.5), /* Medium glow */
                0 0 25px rgba(255, 0, 127, 0.3); /* Outer faint glow */
        }

        /* The labels below the numbers (DAYS, HOURS, etc.) */
        .label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        /* Breakpoints for smaller screens */
        @media (max-width: 480px) {
            .glass-panel { padding: 30px; }
            h1 { font-size: 26px; }
            .number { font-size: 40px; }
            .count-block { min-width: 50px; margin: 0 5px; }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>MCC2026</h1>
        <p class="intro-text">
            Are you the <span class="highlight">Main Character?</span><br>
            Find out on May 15th, 2026
        </p>
        
        <div id="countdown">
            <div class="count-block">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="count-block">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="count-block">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="count-block">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs</span>
            </div>
        </div>
    </div>

    <script>
        // Use the exact date you specified
        const targetDate = new Date("May 15, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const timeLeft = targetDate - now;

            if (timeLeft <= 0) {
                document.getElementById("countdown").innerHTML = "<h2 style='color:white; font-weight:300;'>THE SPOTLIGHT IS YOURS.</h2>";
                clearInterval(interval);
                return;
            }

            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

            // Add leading zeros if number is < 10 (e.g., 9 -> 09)
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        // Run immediately, then every second
        updateCountdown();
        const interval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
